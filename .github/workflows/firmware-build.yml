name: Firmware build

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - "tests/**"
      - "tools/**"
      - "examples/traces/**"
      - ".github/workflows/firmware-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "firmware/**"
      - "tests/**"
      - "tools/**"
      - "examples/traces/**"
      - ".github/workflows/firmware-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-tests:
    name: Host logic tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure tests
        run: cmake -S tests -B tests/build

      - name: Build tests
        run: cmake --build tests/build --config Release

      - name: Run tests
        run: ctest --test-dir tests/build --build-config Release --output-on-failure

  build:
    name: ESP-IDF v5.0 / ESP32
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.0
          target: esp32
          path: firmware
