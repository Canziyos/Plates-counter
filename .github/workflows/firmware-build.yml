name: Firmware build

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - "tests/**"
      - "tools/**"
      - "examples/traces/**"
      - ".github/workflows/firmware-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "firmware/**"
      - "tests/**"
      - "tools/**"
      - "examples/traces/**"
      - ".github/workflows/firmware-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-tests:
    name: Host logic tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure tests
        run: cmake -S tests -B tests/build

      - name: Build tests
        run: cmake --build tests/build --config Release

      - name: Run tests
        run: ctest --test-dir tests/build --build-config Release --output-on-failure

  build:
    name: ESP-IDF v5.0 / ESP32
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.0
          target: esp32
          path: firmware

      - name: Generate firmware checksums
        run: >-
          sha256sum
          firmware/build/dish_counter.bin
          firmware/build/bootloader/bootloader.bin
          firmware/build/partition_table/partition-table.bin
          > firmware/SHA256SUMS

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: dish-counter-esp32-${{ github.sha }}
          path: |
            firmware/build/dish_counter.bin
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
            firmware/build/*args*
            firmware/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
